<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>可领养动物 - Pet Haven</title>
    <link rel="stylesheet" th:href="@{/assets/style.css}" href="/assets/style.css">
</head>
<body>
<header class="site-header">
    <div class="site-brand"><span class="brand-chip dark">PET HAVEN</span><h1>流浪动物守护与领养平台</h1></div>
    <nav class="site-nav">
        <a th:href="@{/user/home}" href="/user/home">首页</a>
        <a class="active" th:href="@{/user/animals}" href="/user/animals">可领养动物</a>
        <a th:href="@{/user/applications}" href="/user/applications">我的申请</a>
        <a th:href="@{/user/articles}" href="/user/articles">公益资讯</a>
        <a th:href="@{/user/profile}" href="/user/profile">我的资料</a>
    </nav>
    <div class="site-actions"><a class="outline-btn" th:href="@{/logout}" href="/logout">退出登录</a></div>
</header>
<main class="site-main">
    <section class="detail-hero-banner"><div><span class="eyebrow">公开动物库</span><h2 th:text="${pageTitle}"></h2><p th:text="${pageDesc}"></p></div></section>
    <section class="content-section">
        <div class="empty-state-card" th:if="${#lists.isEmpty(allAnimals)}">
            当前还没有可展示的动物档案，待志愿者提交并由管理员审核后会在这里出现。
        </div>
        <div class="animal-grid premium-grid" th:unless="${#lists.isEmpty(allAnimals)}">
            <a class="animal-card premium-animal-card" th:each="animal : ${allAnimals}" th:href="@{'/user/animal/' + ${animal.id}}" href="#">
                <div class="animal-cover scenic-cover">
                    <img th:if="${animal.coverImage != null and !#strings.isEmpty(animal.coverImage)}"
                         th:src="@{${animal.coverImage}}"
                         alt="动物图片"
                         style="width: 100%; height: 100%; object-fit: cover; display: block;">
                    <span class="cover-fallback"
                          th:if="${animal.coverImage == null or #strings.isEmpty(animal.coverImage)}"
                          th:text="${animal.category == '狗' ? '🐶' : (animal.category == '猫' ? '🐱' : '🐾')}"></span>
                </div>
                <div class="card-body">
                    <h4 th:text="${animal.name}"></h4>
                    <p th:text="${animal.category + ' · ' + animal.breed}"></p>
                    <div class="tag-row">
                        <span class="tag" th:text="${animal.ageDesc}"></span>
                        <span class="tag" th:text="${animal.gender}"></span>
                        <span class="tag status" th:text="${animal.status == 'OPEN_FOR_ADOPTION' ? '开放领养中' : (animal.status == 'APPLICATION_REVIEW' ? '申请审核中' : (animal.status == 'FOLLOWUP_PENDING' ? '待回访' : (animal.status == 'ADOPTION_COMPLETED' ? '已完成领养' : animal.status)))}"></span>
                    </div>
                    <small th:text="${animal.currentLocation}"></small>
                </div>
            </a>
        </div>
    </section>
</main>
</body>
</html>
