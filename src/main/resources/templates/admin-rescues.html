<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>救助审核 - 管理员</title>
    <link rel="stylesheet" th:href="@{/assets/style.css}" href="/assets/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="pro-sidebar admin-theme">
        <div class="sidebar-brand-block">
            <span class="brand-chip dark">PET HAVEN OPS</span>
            <h2>管理员运营中心</h2>
            <p th:text="'欢迎回来，' + ${loginUser.realName}"></p>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" th:href="@{/admin/dashboard}" href="/admin/dashboard">工作台总览</a>
            <a class="nav-item" th:href="@{/admin/animals}" href="/admin/animals">动物档案</a>
            <a class="nav-item active" th:href="@{/admin/rescues}" href="/admin/rescues">救助审核</a>
            <a class="nav-item" th:href="@{/admin/applications}" href="/admin/applications">领养审核</a>
            <a class="nav-item" th:href="@{/admin/members}" href="/admin/members">成员管理</a>
            <a class="nav-item" th:href="@{/admin/analytics}" href="/admin/analytics">数据分析</a>
        </nav>
        <div class="sidebar-footer"><a class="logout" th:href="@{/logout}" href="/logout">退出登录</a></div>
    </aside>
    <main class="pro-content">
        <section class="hero-banner admin-banner">
            <div><span class="eyebrow">审核中台</span><h1>集中处理一线救助记录</h1><p>可以直接审核通过或驳回，确保志愿者提交内容有明确反馈。</p></div>
        </section>
        <section class="panel-section">
            <div class="section-head"><div><h3>待处理救助记录</h3><p>用于实际演示“发现 - 提交 - 审核 - 入库”的闭环</p></div></div>
            <div class="table-shell">
                <table>
                    <thead><tr><th>动物</th><th>类型/性别</th><th>发现地点</th><th>志愿者</th><th>状态</th><th>审核意见</th><th>操作</th></tr></thead>
                    <tbody>
                    <tr th:each="rescue : ${rescues}">
                        <td th:text="${rescue.animalName}"></td>
                        <td th:text="${rescue.category + ' / ' + rescue.gender}"></td>
                        <td th:text="${rescue.found_location}"></td>
                        <td th:text="${rescue.volunteerName}"></td>
                        <td><span class="badge" th:text="${rescue.audit_status}"></span></td>
                        <td th:text="${rescue.audit_remark}"></td>
                        <td class="action-col">
                            <form th:if="${rescue.audit_status == '待审核'}" th:action="@{/admin/rescue/approve}" action="/admin/rescue/approve" method="post" class="stack-form">
                                <input type="hidden" name="rescueId" th:value="${rescue.id}"><input name="auditRemark" value="信息完整，同意入库"><button type="submit">审核通过</button>
                            </form>
                            <form th:if="${rescue.audit_status == '待审核'}" th:action="@{/admin/rescue/reject}" action="/admin/rescue/reject" method="post" class="stack-form danger-form">
                                <input type="hidden" name="rescueId" th:value="${rescue.id}"><input name="auditRemark" value="信息不完整，请补充"><button type="submit">驳回记录</button>
                            </form>
                            <span th:if="${rescue.audit_status != '待审核'}">已处理</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
