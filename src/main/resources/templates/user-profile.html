<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的资料 - Pet Haven</title>
    <link rel="stylesheet" th:href="@{/assets/style.css}" href="/assets/style.css">
</head>
<body>
<header class="site-header">
    <div class="site-brand">
        <span class="brand-chip dark">PET HAVEN</span>
        <h1>流浪动物守护与领养平台</h1>
    </div>
    <nav class="site-nav">
        <a th:href="@{/user/home}" href="/user/home">首页</a>
        <a th:href="@{/user/animals}" href="/user/animals">可领养动物</a>
        <a th:href="@{/user/applications}" href="/user/applications">我的申请</a>
        <a th:href="@{/user/articles}" href="/user/articles">公益资讯</a>
        <a class="active" th:href="@{/user/profile}" href="/user/profile">我的资料</a>
    </nav>
    <div class="site-actions">
        <a class="outline-btn" th:href="@{/logout}" href="/logout">退出登录</a>
    </div>
</header>

<main class="site-main">
    <section class="content-section profile-hero-section">
        <div class="section-head">
            <div>
                <h3>我的资料</h3>
                <p>集中查看个人基础信息与历史申请记录，便于持续跟踪领养过程</p>
            </div>
        </div>
        <div class="profile-grid premium-profile-grid">
            <div class="profile-item"><span>账号</span><strong th:text="${loginUser.username}"></strong></div>
            <div class="profile-item"><span>姓名</span><strong th:text="${loginUser.realName}"></strong></div>
            <div class="profile-item"><span>性别</span><strong th:text="${loginUser.gender}"></strong></div>
            <div class="profile-item"><span>手机号</span><strong th:text="${loginUser.phone}"></strong></div>
            <div class="profile-item"><span>邮箱</span><strong th:text="${loginUser.email}"></strong></div>
            <div class="profile-item"><span>角色</span><strong>普通领养用户</strong></div>
            <div class="profile-item full-span"><span>个人说明</span><strong th:text="${loginUser.bio}"></strong></div>
        </div>
    </section>

    <section class="content-section">
        <div class="section-head">
            <div>
                <h3>历史申请记录</h3>
                <p>包含审核意见、补资料要求与最终处理结果</p>
            </div>
        </div>
        <div class="table-shell">
            <table>
                <thead>
                <tr><th>动物</th><th>状态</th><th>审核意见</th><th>申请时间</th></tr>
                </thead>
                <tbody>
                <tr th:each="app : ${myApplications}">
                    <td th:text="${app.animalName}"></td>
                    <td><span class="badge" th:text="${app.status}"></span></td>
                    <td th:text="${app.audit_remark}"></td>
                    <td th:text="${#dates.format(app.create_time,'yyyy-MM-dd HH:mm')}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
