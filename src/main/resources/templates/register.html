<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册账号 - Pet Haven</title>
    <link rel="stylesheet" th:href="@{/assets/style.css}" href="/assets/style.css">
</head>
<body class="auth-page">
<div class="auth-shell">
    <section class="auth-visual register-visual">
        <div class="visual-overlay"></div>
        <div class="visual-content">
            <span class="brand-chip">ADOPT WITH LOVE</span>
            <h1>从第一次注册开始，就进入一个完整、温暖、可持续运营的领养服务体验</h1>
            <p>注册后即可浏览公开领养动物、提交领养申请、查看审核状态，并参与后续回访闭环。</p>
            <div class="visual-list">
                <div class="visual-list-item">统一账号体系，注册后直接成为普通领养用户</div>
                <div class="visual-list-item">资料补全后可提交更完整的领养申请</div>
                <div class="visual-list-item">支持审核反馈、补资料与回访追踪</div>
            </div>
        </div>
    </section>

    <section class="auth-card premium-card">
        <div class="auth-header">
            <div>
                <span class="eyebrow">创建账号</span>
                <h2>注册领养用户</h2>
                <p>填写基础信息后即可进入平台体验完整领养流程</p>
            </div>
            <a class="ghost-link compact-link" th:href="@{/login}" href="/login">返回登录</a>
        </div>

        <form th:action="@{/register}" action="/register" method="post" class="auth-form two-col-form">
            <div>
                <label>账号</label>
                <input name="username" placeholder="请设置登录账号" required>
            </div>
            <div>
                <label>密码</label>
                <input type="password" name="password" placeholder="请设置密码" required>
            </div>
            <div>
                <label>姓名</label>
                <input name="realName" placeholder="请输入真实姓名" required>
            </div>
            <div>
                <label>性别</label>
                <select name="gender" required>
                    <option value="">请选择性别</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                    <option value="保密">保密</option>
                </select>
            </div>
            <div>
                <label>手机号</label>
                <input name="phone" placeholder="请输入手机号" required>
            </div>
            <div>
                <label>邮箱</label>
                <input name="email" type="email" placeholder="请输入邮箱" required>
            </div>
            <button class="full-span primary-btn large-btn" type="submit">完成注册</button>
        </form>

        <p class="error" th:if="${error}" th:text="${error}"></p>
    </section>
</div>
</body>
</html>
