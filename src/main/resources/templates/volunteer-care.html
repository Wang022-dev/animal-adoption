<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>护理跟进 - 志愿者</title>
    <link rel="stylesheet" th:href="@{/assets/style.css}" href="/assets/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="pro-sidebar volunteer-theme">
        <div class="sidebar-brand-block"><span class="brand-chip dark">FIELD CARE</span><h2>志愿者任务中心</h2><p th:text="'欢迎回来，' + ${loginUser.realName}"></p></div>
        <nav class="sidebar-nav">
            <a class="nav-item" th:href="@{/volunteer/dashboard}" href="/volunteer/dashboard">任务总览</a>
            <a class="nav-item" th:href="@{/volunteer/rescues}" href="/volunteer/rescues">救助登记</a>
            <a class="nav-item active" th:href="@{/volunteer/care}" href="/volunteer/care">护理跟进</a>
            <a class="nav-item" th:href="@{/volunteer/followups}" href="/volunteer/followups">回访管理</a>
            <a class="nav-item" th:href="@{/volunteer/profile}" href="/volunteer/profile">个人资料</a>
        </nav>
        <div class="sidebar-footer"><a class="logout" th:href="@{/logout}" href="/logout">退出登录</a></div>
    </aside>
    <main class="pro-content">
        <section class="hero-banner volunteer-banner"><div><span class="eyebrow">护理任务</span><h1>把安置与护理阶段可视化</h1><p>该页面强调动物当前状态、护理建议与后续跟进的专业感。</p></div></section>
        <section class="panel-section">
            <div class="section-head"><div><h3>待重点关注动物</h3><p>按当前动物档案展示护理、健康与安置信息</p></div></div>
            <div class="table-shell">
                <table>
                    <thead><tr><th>昵称</th><th>健康状态</th><th>紧急程度</th><th>安置地点</th><th>性格</th><th>领养要求</th></tr></thead>
                    <tbody>
                    <tr th:each="animal : ${availableAnimals}">
                        <td th:text="${animal.name}"></td>
                        <td th:text="${animal.healthStatus}"></td>
                        <td><span class="badge" th:text="${animal.emergencyLevel}"></span></td>
                        <td th:text="${animal.currentLocation}"></td>
                        <td th:text="${animal.personality}"></td>
                        <td th:text="${animal.adoptRequirements}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
